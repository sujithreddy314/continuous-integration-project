name: Simple CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  reliable-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run reliable tests
        run: pytest tests/reliable